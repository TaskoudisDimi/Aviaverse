version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vyron
      POSTGRES_PASSWORD: vyron_secret
      POSTGRES_DB: vyron
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vyron"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  gateway:
    build: ./services/gateway
    ports:
      - "8080:8080"
    environment:
      - AUTH_SERVICE_URL=http://auth:8081
      - CONTENT_SERVICE_URL=http://content:8082
      - AI_SERVICE_URL=http://ai:8083
      - EXAM_SERVICE_URL=http://exam:8084
      - PROGRESS_SERVICE_URL=http://progress:8085
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - auth
      - content
      - ai
      - exam
      - progress

  auth:
    build: ./services/auth
    ports:
      - "8081:8081"
    environment:
      - DATABASE_URL=postgres://vyron:vyron_secret@postgres:5432/vyron?sslmode=disable
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRY=24h
      - PORT=8081
    depends_on:
      postgres:
        condition: service_healthy

  content:
    build: ./services/content
    ports:
      - "8082:8082"
    environment:
      - DATABASE_URL=postgres://vyron:vyron_secret@postgres:5432/vyron?sslmode=disable
      - PORT=8082
    depends_on:
      postgres:
        condition: service_healthy

  ai:
    build: ./services/ai
    ports:
      - "8083:8083"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PORT=8083
    depends_on:
      - redis

  exam:
    build: ./services/exam
    ports:
      - "8084:8084"
    environment:
      - DATABASE_URL=postgres://vyron:vyron_secret@postgres:5432/vyron?sslmode=disable
      - REDIS_URL=redis:6379
      - PORT=8084
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  progress:
    build: ./services/progress
    ports:
      - "8085:8085"
    environment:
      - DATABASE_URL=postgres://vyron:vyron_secret@postgres:5432/vyron?sslmode=disable
      - PORT=8085
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - gateway

volumes:
  postgres_data:
